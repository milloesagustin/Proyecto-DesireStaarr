server:
  port: 8090

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: productos-service
          uri: http://localhost:8082
          predicates:
            - Path=/productos/**

        - id: skus-service
          uri: http://localhost:8083
          predicates:
            - Path=/skus/**

        - id: inventario-service
          uri: http://localhost:8084
          predicates:
            - Path=/inventario/**

        - id: clientes-service
          uri: http://localhost:8085
          predicates:
            - Path=/clientes/**

        - id: ventas-service
          uri: http://localhost:8086
          predicates:
            - Path=/ventas/**